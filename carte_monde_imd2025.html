function noteColor(n){
  if(n==='A') return '#1a9850';
  if(n==='B+') return '#66bd63';
  if(n==='B') return '#fdae61';
  if(n==='C') return '#f46d43';
  return '#d73027';
}

const map = L.map('map',{center:[20,10],zoom:2});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'© CARTO | IMD Smart City Index 2025',subdomains:'abcd',maxZoom:19
}).addTo(map);

const markers = {};

function varHtml(v){
  const n = Number(v);
  if(v==='Nouveau'||v==='NEW') return '<span class="tn">Nouveau</span>';
  if(!isNaN(n) && n>0) return '<span class="tu">▲ +'+n+'</span>';
  if(!isNaN(n) && n<0) return '<span class="td">▼ '+n+'</span>';
  return '<span style="color:#8b949e">= 0</span>';
}

CITIES.forEach(city => {
  const col = noteColor(city.note);
  const icon = L.divIcon({
    className:'',
    html:`<div style="display:flex;flex-direction:column;align-items:center">
      <div style="width:36px;height:36px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:linear-gradient(135deg,${col},${col}99);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,0.4);border:1.5px solid rgba(255,255,255,0.25)">
        <span style="transform:rotate(45deg);font-weight:700;font-size:0.62rem;color:#fff;font-family:Outfit,sans-serif">#${city.rank}</span>
      </div>
      <div style="width:10px;height:4px;background:rgba(0,0,0,0.25);border-radius:50%;filter:blur(1px);margin-top:1px"></div>
    </div>`,
    iconSize:[38,44],iconAnchor:[19,44],popupAnchor:[0,-48]
  });

  const popup = `<div class="ph" style="border-top:3px solid ${col}">
    <div class="prank"><span class="prn" style="color:${col}">#${city.rank}</span>
      <div><div style="font-size:0.65rem;color:#8b949e">classement mondial</div>
      <span class="gp" style="background:${col}22;border:1px solid ${col};color:${col}">${city.note}</span></div>
    </div>
    <h3>${city.name}</h3><div class="pc">🏳️ ${city.country}</div>
  </div>
  <div class="pb">
    <div class="pr"><span class="lb">Structure</span><span class="vl" style="color:${noteColor(city.noteS)}">${city.noteS}</span></div>
    <div class="pr"><span class="lb">Technologie</span><span class="vl" style="color:${noteColor(city.noteT)}">${city.noteT}</span></div>
    <div class="pr"><span class="lb">Rang 2024</span><span class="vl">#${city.r2024}</span></div>
    <div class="pr"><span class="lb">Évolution</span><span class="vl">${varHtml(city.var)}</span></div>
  </div>`;

  const mk = L.marker([city.lat,city.lon],{icon}).addTo(map).bindPopup(popup,{maxWidth:250});
  markers[city.rank] = {marker:mk, city};
  mk.on('popupopen',()=>{
    document.querySelectorAll('.city-card').forEach(c=>c.classList.remove('active'));
    const el=document.getElementById('card-'+city.rank);
    if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'})}
  });
});

function buildList(filtered){
  const list = document.getElementById('cityList');
  list.innerHTML='';
  document.getElementById('count').textContent = filtered.length;
  filtered.forEach(city=>{
    const col=noteColor(city.note);
    const vn=Number(city.var);
    const varStr=city.var==='Nouveau'||city.var==='NEW'?'Nouveau':(!isNaN(vn)&&vn>0?'▲ +'+vn:!isNaN(vn)&&vn<0?'▼ '+vn:'= 0');
    const card=document.createElement('div');
    card.className='city-card'; card.id='card-'+city.rank;
    card.innerHTML=`<div class="rank-b" style="background:${col}22;border:1px solid ${col}55">
      <span class="rn" style="color:${col}">#${city.rank}</span>
    </div>
    <div class="city-info"><h3>${city.name}</h3><div class="meta">${city.country} · 2024: #${city.r2024} ${varStr}</div></div>
    <span class="gp" style="background:${col}22;border:1px solid ${col};color:${col}">${city.note}</span>`;
    card.addEventListener('click',()=>{
      map.setView([city.lat,city.lon],8,{animate:true,duration:0.8});
      markers[city.rank].marker.openPopup();
      document.querySelectorAll('.city-card').forEach(c=>c.classList.remove('active'));
      card.classList.add('active');
    });
    list.appendChild(card);
  });
}

function filterCities(){
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=CITIES.filter(c=>c.name.toLowerCase().includes(q)||c.country.toLowerCase().includes(q));
  buildList(filtered);
}

buildList(CITIES);
</script>
