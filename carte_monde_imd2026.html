function nc(n){
  if(!n) return '#888';
  if(n.includes('AAA')) return '#00c9a7';
  if(n.startsWith('A')) return '#1a9850';
  if(n==='B+'||n.includes('BB')) return '#66bd63';
  if(n.startsWith('B')) return '#fdae61';
  if(n.startsWith('C')) return '#f46d43';
  return '#d73027';
}

const sB=CITIES.filter(c=>/^B/.test(c.note)).length;
const sCD=CITIES.filter(c=>/^[CD]/.test(c.note)).length;
document.getElementById('sA').textContent=sA;
document.getElementById('sB').textContent=sB;
document.getElementById('sC').textContent=sCD;

// Note filter chips
const notes=[...new Set(CITIES.map(c=>c.note))].sort();
let activeChip=null;
const chipsEl=document.getElementById('chips');
notes.forEach(n=>{
  const chip=document.createElement('span');
  chip.className='chip';chip.textContent=n;
  chip.style.setProperty('--c',nc(n));
  chip.onclick=()=>{
    if(activeChip===n){activeChip=null;chip.classList.remove('active')}
    else{activeChip=n;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));chip.classList.add('active')}
    filterCities();
  };
  chipsEl.appendChild(chip);
});

    varN='<span class="tn">Nouveau</span>';
  }

  const popup='<div class="ph" style="border-top:3px solid '+col+'"><div class="prank"><span class="prn" style="color:'+col+'">#'+city.rank+'</span><div><div style="font-size:0.65rem;color:#6e7a8a">classement mondial</div><span class="gp" style="background:'+col+'22;border:1px solid '+col+';color:'+col+'">'+city.note+'</span></div></div><h3>'+city.name+'</h3><div class="pc">\ud83c\udff3\ufe0f '+city.country+'</div></div><div class="pb"><div class="pr"><span class="lb">Structure</span><span class="vl" style="color:'+nc(city.noteS)+'">'+city.noteS+'</span></div><div class="pr"><span class="lb">Technologie</span><span class="vl" style="color:'+nc(city.noteT)+'">'+city.noteT+'</span></div><div class="pr"><span class="lb">Rang 2025</span><span class="vl">'+(r25&&r25!=='None'?'#'+r25:'—')+'</span></div><div class="pr"><span class="lb">\u00c9volution</span><span class="vl">'+varN+'</span></div></div>';

  const mk=L.marker([city.lat,city.lon],{icon}).addTo(map).bindPopup(popup,{maxWidth:260});
  markers[city.rank]={marker:mk,city};
  mk.on('popupopen',()=>{
    document.querySelectorAll('.city-card').forEach(c=>c.classList.remove('active'));
    const el=document.getElementById('card-'+city.rank);
    if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'})}
  });
});

function buildList(filtered){
  const list=document.getElementById('cityList');
  list.innerHTML='';
  document.getElementById('count').textContent=filtered.length;
  filtered.forEach(city=>{
    const col=nc(city.note);
    const r25=city.r2025;
    let varStr='';
    if(r25&&r25!=='None'&&r25!=='NEW'){
      const diff=parseInt(r25)-city.rank;
      varStr=diff>0?'\u25b2 +'+diff:diff<0?'\u25bc '+diff:'= 0';
    } else { varStr='Nouveau'; }
    const card=document.createElement('div');
    card.className='city-card';card.id='card-'+city.rank;
    card.innerHTML='<div class="rank-b" style="background:'+col+'18;border:1px solid '+col+'44"><span class="rn" style="color:'+col+'">#'+city.rank+'</span></div><div class="city-info"><h3>'+city.name+'</h3><div class="meta">'+city.country+' \u00b7 2025: '+(r25&&r25!=='None'?'#'+r25:'\u2014')+' '+varStr+'</div></div><span class="gp" style="background:'+col+'18;border:1px solid '+col+';color:'+col+'">'+city.note+'</span>';
    card.addEventListener('click',()=>{
      map.setView([city.lat,city.lon],8,{animate:true,duration:0.8});
      markers[city.rank].marker.openPopup();
      document.querySelectorAll('.city-card').forEach(c=>c.classList.remove('active'));
      card.classList.add('active');
    });
    list.appendChild(card);
  });
}

function filterCities(){
  const q=document.getElementById('search').value.toLowerCase();
  let filtered=CITIES.filter(c=>c.name.toLowerCase().includes(q)||c.country.toLowerCase().includes(q));
  if(activeChip) filtered=filtered.filter(c=>c.note===activeChip);
  buildList(filtered);
}

buildList(CITIES);
</script>
</body>
